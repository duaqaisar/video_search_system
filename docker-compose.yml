services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: videoapp
      POSTGRES_PASSWORD: videoapp_dev_password
      POSTGRES_DB: video_search
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: videoapp
      MINIO_ROOT_PASSWORD: videoapp_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://videoapp:videoapp_dev_password@postgres:5432/video_search
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    volumes:
      - ./data:/app/data

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://videoapp:videoapp_dev_password@postgres:5432/video_search
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
